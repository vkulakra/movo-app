name: habit_mood_journal
description: A beautiful Habit Tracker & Mood Journal app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path: ^1.9.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  sembast: ^3.8.5
  sembast_web: ^2.4.0
  shared_preferences: ^2.5.5
  timezone: ^0.10.1
  workmanager: ^0.9.0+3
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.7+1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
