<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movo — Habit Tracker & Mood Journal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      font-size: 32px;
      color: white;
      font-weight: 700;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .links a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: #f9fafb;
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .links a:hover {
      background: #ede9fe;
      border-color: #c4b5fd;
      transform: translateY(-1px);
    }

    .links a .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .links a .icon.privacy {
      background: #ede9fe;
    }

    .links a .icon.contact {
      background: #dbeafe;
    }

    .links a .icon.support {
      background: #d1fae5;
    }

    .links a .text {
      text-align: left;
    }

    .links a .text .title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 2px;
    }

    .links a .text .desc {
      font-size: 13px;
      color: #6b7280;
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #9ca3af;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>

    <h1>Movo</h1>
    <p class="tagline">
      A privacy-first habit tracker &amp; mood journal.<br>
      All your data stays on your device.
    </p>

    <div class="links">
      <a href="PRIVACY_POLICY.md">
        <div class="icon privacy">&#128737;</div>
        <div class="text">
          <div class="title">Privacy Policy</div>
          <div class="desc">How we handle your data</div>
        </div>
      </a>

      <a href="contact.html">
        <div class="icon contact">&#9993;</div>
        <div class="text">
          <div class="title">Contact &amp; Support</div>
          <div class="desc">Get help or send feedback</div>
        </div>
      </a>
    </div>

    <div class="footer">
      &copy; 2026 Movo. All rights reserved.
    </div>
  </div>
</body>
</html>
